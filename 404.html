<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — TotalCloudAI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0A1A14;color:#E8FFF0;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
.container{text-align:center;position:relative;z-index:1;padding:2rem}
.code{font-family:'Space Grotesk',sans-serif;font-size:clamp(120px,20vw,200px);font-weight:700;background:linear-gradient(135deg,#10B981,#F59E0B);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
.msg{font-size:1.25rem;color:#80BFA0;margin:1rem 0 2rem}
.btn{display:inline-block;padding:14px 36px;background:linear-gradient(135deg,#10B981,#059669);color:#fff;border-radius:12px;font-weight:600;text-decoration:none;transition:transform 0.3s,box-shadow 0.3s}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(16,185,129,0.3)}
.blob{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none}
.blob-1{width:500px;height:400px;top:-10%;left:-5%;background:linear-gradient(135deg,rgba(16,185,129,0.25),rgba(245,158,11,0.15));animation:float 18s ease-in-out infinite}
.blob-2{width:400px;height:400px;bottom:-10%;right:-5%;background:linear-gradient(135deg,rgba(245,158,11,0.2),rgba(16,185,129,0.1));animation:float 22s ease-in-out infinite reverse}
@keyframes float{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(40px,30px) scale(1.1)}}
</style>
</head>
<body>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="container">
<div class="code">404</div>
<p class="msg">The page you're looking for has drifted into the cloud.</p>
<a href="/" class="btn">Back to Home →</a>
</div>
</body>
</html>
